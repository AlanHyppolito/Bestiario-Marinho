<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="/CSS/cadastro.css">
</head>

<body>

    <h2>Cadastro</h2>
    <div class="card-cadastro">

        <div class="inserir-nome">
            <input type="text" id="ipt_nome" oninput="Nome()">
            <label for="ipt_nome">Insira seu nome completo</label>
            <span id="spn_nome"></span>
        </div>
        <div class="inseir-email">
            <input type="text" id="ipt_email" oninput="Email()">
            <label for="">Insira seu email</label>
            <span id="spn_email"></span>
        </div>
        <div class="inserir-senha">
            <input type="text" id="ipt_senha" oninput="">
            <label for="">Insira sua senha desejada</label>
            <span id="spn_senha"></span>
        </div>
        <div class="inserir-senha-confirmacao">
            <input type="text" id="ipt_confirmacaoSenha" oninput="">
            <label for="">Insira sua senha novamente</label>
            <span id="spn_confirmacao_senha"></span>
        </div>
        <button onclick="cadastrar()">Entrar</button>
        <span id="spn_cadastrar"></span>
    </div>

</body>

</html>
<script src="/JS/cadastro.js"></script>
