<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="/CSS/cadastro.css">
</head>

<body>
    <h2>Login</h2>
    <div class="card-login">

        <div class="inserir-nome">
            <input type="text" id="ipt_nome">
            <label for="">Insira seu nome completo</label>
        </div>
        <div class="inseir-email">
            <input type="text" id="ipt_email">
            <label for="">Insira seu email</label>
        </div>
        <div class="inserir-senha">
            <input type="text" id="ipt_senha">
            <label for="">Insira sua senha desejada</label>
        </div>
        <div class="inserir-senha-confirmacao">
            <input type="text" id="ipt_senha">
            <label for="">Insira sua senha novamente</label>
        </div>
        <button onclick="">Entrar</button>
    </div>

</body>

</html>
<script src="/JS/cadastro.js"></script>
